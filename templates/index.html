<!DOCTYPE html>
<html>

<head>

<title>Deepfake Detection</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
}

.container{
width:600px;
margin:auto;
margin-top:80px;
background:white;
padding:30px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.loading{
display:none;
font-weight:bold;
color:#007BFF;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.progress{
width:100%;
background:#ddd;
border-radius:5px;
margin-top:10px;
}

.progress-bar{
height:20px;
background:#28a745;
border-radius:5px;
}

</style>

<script>

function showLoading(){
document.getElementById("loading").style.display="block";
}

</script>

</head>

<body>

<div class="container">

<h2>Deepfake Video Detection</h2>

<form method="POST"
enctype="multipart/form-data"
onsubmit="showLoading()">

<input type="file"
name="video"
accept=".mp4,.avi,.mov"
required>

<br><br>

<button type="submit">Analyze</button>

</form>

<div id="loading" class="loading">
Processing video... Please wait...
</div>

{% if result %}

<div class="result">
{{result}}
</div>

<div class="progress">

<div class="progress-bar"
style="width:{{confidence}}%">
</div>

</div>

<p>Confidence: {{confidence|round(2)}}%</p>

{% endif %}

</div>

</body>

</html>
